<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#333333">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/service-worker.js" defer></script>
    <script src="/static/main.js" defer></script>
</head>

<body>
    <div class="container">
        <header>
            <p class="label">Horários ISEP</p>
            <a href="/">
                <h1>Turmas</h1>
            </a>
            <div class="divider"></div>
        </header>

        <ul>
            {% for turma in turmas %}
            <li>
                <a href="/{{ turma }}">
                    <span class="link-title">{{ turma }}</span>
                    <span class="link-meta"></span>
                    <span class="arrow">→</span>
                </a>
            </li>
            {% endfor %}
            <li id="installBtn" class="pseudo-a hover" style="display: none;">
                <div>
                    <span class="link-title">Install</span>
                    <span class="link-meta">PWA App</span>
                    <span class="arrow">→</span>
                </div>
            </li>
        </ul>
        
        <footer>Made by <a href="https://www.linkedin.com/in/henrique-varela">Henrique Varela</a>.</footer>
    </div>
</body>

</html>
